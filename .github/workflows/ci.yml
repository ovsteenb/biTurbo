name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libopenblas-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create sidecar placeholder
        run: |
          mkdir -p src-tauri/binaries
          echo placeholder > src-tauri/binaries/biturbo-mcp-x86_64-unknown-linux-gnu

      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

  mcp-smoke:
    name: MCP smoke test
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Create sidecar placeholder
        run: |
          mkdir -p src-tauri/binaries
          echo placeholder > src-tauri/binaries/biturbo-mcp-x86_64-unknown-linux-gnu
      - run: npm run mcp:build
      - run: npm run mcp:test
