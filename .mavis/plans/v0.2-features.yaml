version: 1
plan:
  name: "biTurbo v0.2 — light mode, confirm modal, context menu, MCP test, fast graph"
  max_concurrency: 5
  max_consecutive_failures: 2
  max_cycles: 8
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: light-mode
    title: "Add light mode theme with toggle"
    assigned_to: coder
    verified_by: verifier
    max_retries: 2
    prompt: |
      Add a light mode to the biTurbo Tauri 2 + React 18 + Tailwind 3 app at
      /Users/lxxfysl/Projekte/biTurbo.

      The app currently has only a dark theme. Tokens live in src/index.css
      using CSS custom properties under :root. Existing components use Tailwind
      utility classes that reference those tokens (bg-bg, text-text, bg-surface,
      border-border, text-text-muted, text-text-dim, text-accent, etc.).

      Concrete requirements:
      1. Introduce a `:root[data-theme="light"]` block in src/index.css with
         light equivalents for every CSS custom property currently defined
         under :root. Use warm off-white background, near-black text, similar
         accent. Reference the existing dark tokens for the exact set of
         variables to override.
      2. Add a top-bar toggle button in src/components/TopBar.tsx (Sun/Moon
         icon from lucide-react) that switches `document.documentElement`'s
         `data-theme` attribute. Persist choice to localStorage under key
         "biturbo-theme". Default = dark. Apply the persisted value on app
         boot in main.tsx before the first paint to avoid flash.
      3. Ensure every existing screen (Overview, Memories, Projects, Graph,
         Agents, Settings) renders correctly in both themes. Do NOT add
         hard-coded colors anywhere; always use the existing CSS-variable-
         backed Tailwind tokens.
      4. After changes, run `pnpm build` from /Users/lxxfysl/Projekte/biTurbo
         and confirm a clean build. Report changed files and the build output
         tail. Do NOT rebuild the Rust binary.
    verify_prompt: |
      Independently verify the light mode feature.

      1. Read src/index.css and confirm there is a :root[data-theme="light"]
         block that overrides every CSS custom property in :root.
      2. Read src/components/TopBar.tsx and confirm a toggle button is wired
         to document.documentElement.dataset.theme with localStorage
         persistence.
      3. Read src/main.tsx and confirm theme is applied before React mounts
         (no flash). Specifically look for a synchronous read of
         localStorage and document.documentElement.dataset.theme assignment
         BEFORE ReactDOM.createRoot(...).render(...).
      4. Run `pnpm build` from /Users/lxxfysl/Projekte/biTurbo. It must
         complete with no TypeScript or build errors.
      5. grep src/ for hard-coded hex colors in TSX/TS files (e.g.
         #[0-9a-fA-F]{6}) that are NOT in the existing token set — flag any
         new hard-coded colors as a FAIL.
      6. PASS only if all five checks succeed. Report the file:line of the
         toggle button, the theme application site in main.tsx, and the
         light token block.

  - id: confirm-modal
    title: "Reusable ConfirmModal component for destructive actions"
    assigned_to: coder
    verified_by: verifier
    max_retries: 2
    prompt: |
      Add a reusable confirmation modal to biTurbo at
      /Users/lxxfysl/Projekte/biTurbo.

      Create src/components/ConfirmModal.tsx — a controlled modal with:
      - props: `open: boolean`, `title: string`, `body: string` (or ReactNode),
        `confirmLabel?: string` (default "Delete"), `cancelLabel?: string`
        (default "Cancel"), `tone?: "danger" | "neutral"` (default "danger"),
        `onConfirm: () => void | Promise<void>`, `onCancel: () => void`
      - backdrop click + Escape key cancel
      - focus trap (focus confirm button on open, return focus to opener on
        close)
      - matches the existing dark-theme tokens (bg-surface, border-border,
        text-text, etc.) so it works with both light and dark
      - confirm button shows a spinner while onConfirm is pending; disable
        both buttons during that period
      - exposes a small `useConfirm()` hook OR a Zustand-store based
        imperative API so any component can call
        `confirm({title, body, tone, confirmLabel})` and await the user's
        choice. Add this hook to src/lib/store.ts as a sibling to
        `useApp`.

      Wire it in to existing destructive actions:
      - Projects.tsx `remove(id)` — replace `window.confirm(...)` with the
        modal. Body should mention the project name and warn that memories
        and the code index will be deleted.
      - MemoryDetail.tsx or wherever forget lives — replace any
        window.confirm for memory deletion with the modal. If there are
        multiple forget sites, wire all of them.

      After changes, run `pnpm build`. Report changed files and build tail.

      Constraint: do NOT add a new dependency. Build it from primitives
      already in the project (lucide-react icons, Tailwind tokens, zustand).
    verify_prompt: |
      Independently verify the confirmation modal.

      1. Confirm src/components/ConfirmModal.tsx exists and exports a
         component (named or default) plus either a `useConfirm` hook or a
         store-based imperative API.
      2. Confirm the modal renders a backdrop, a title, a body, and two
         buttons (confirm + cancel). It must support Escape and backdrop
         click to cancel.
      3. grep src/views for `window.confirm` — none should remain for
         destructive project or memory actions. Any remaining `window.confirm`
         for non-destructive flows is OK; flag any remaining destructive
         `window.confirm` as FAIL with file:line.
      4. Run `pnpm build` from /Users/lxxfysl/Projekte/biTurbo — must
         succeed with zero errors.
      5. Open src/components/ConfirmModal.tsx and verify the focus trap
         exists (focus is moved to the confirm button on open, returned on
         close). PASS only if focus management is real, not a stub.
      6. Report file:line of: (a) the new modal, (b) each replacement of
         window.confirm, (c) the focus management code.

  - id: context-menu
    title: "Right-click context menu component + wiring"
    assigned_to: coder
    verified_by: verifier
    max_retries: 2
    prompt: |
      Add a right-click context menu to biTurbo at
      /Users/lxxfysl/Projekte/biTurbo.

      Create src/components/ContextMenu.tsx — a generic, controlled context
      menu:
      - props: `x: number`, `y: number`, `items: Array<{ label: string;
        icon?: ReactNode; onClick: () => void; danger?: boolean;
        disabled?: boolean; shortcut?: string }>`, `onClose: () => void`
      - renders at (x, y) with viewport edge-clamping (flip to up/left if
        the menu would overflow the right or bottom edge)
      - closes on outside click, Escape, and after a successful item click
      - keyboard nav: arrow up/down to move highlight, Enter to activate,
        first non-disabled item is focused on open
      - matches the existing dark/light theme tokens; uses lucide-react
        for any icons passed via items
      - exported hook or store method `useContextMenu()` so any component
        can call `showMenu(x, y, items)` imperatively. Add it to
        src/lib/store.ts.

      Wire context menus into at least:
      - MemoryCard.tsx (or wherever memories are listed in
        src/views/Memories.tsx) — items: "Open", "Copy UID", "Copy content",
        "Forget" (opens ConfirmModal for the forget)
      - Sidebar.tsx project rows — items: "Set as current", "Ingest now"
        (only when project has root_path), "Delete" (opens ConfirmModal)
      - Graph.tsx nodes — items: "Open memory", "Copy UID", "Copy label"

      After changes, run `pnpm build`. Report changed files and the build
      tail.

      Constraint: do NOT add a new dependency. Use existing primitives.
    verify_prompt: |
      Independently verify the context menu.

      1. Confirm src/components/ContextMenu.tsx exists with viewport edge
         clamping, Escape/outside-click close, and keyboard nav (arrow +
         Enter).
      2. Confirm at least three call sites use it: memory list, project
         sidebar, graph nodes. List file:line for each.
      3. Confirm the "Forget" item in the memory context menu opens the
         ConfirmModal (not a window.confirm).
      4. Run `pnpm build` — must succeed.
      5. Read the ContextMenu source and confirm viewport-edge clamping is
         implemented (not just `position: fixed; left: x; top: y;`).
      6. PASS only if all five checks succeed. Report each call site
         file:line.

  - id: mcp-smoke-test
    title: "MCP smoke test script covering all 16 tools"
    assigned_to: coder
    verified_by: verifier
    max_retries: 1
    prompt: |
      Write a standalone MCP smoke test script for biTurbo at
      /Users/lxxfysl/Projekte/biTurbo.

      Path: scripts/test-mcp.sh (or .py — pick whichever is more reliable
      on macOS). The script must:
      1. Spawn the biturbo-mcp binary at
         /Users/lxxfysl/Projekte/biTurbo/src-tauri/target/release/biturbo-mcp
         over stdio using the MCP JSON-RPC protocol.
      2. Run the full MCP handshake (initialize, notifications/initialized).
      3. Call every one of the 16 tools listed in src-tauri/src/mcp.rs and
         assert a non-error response. The tools are: remember, forget,
         update, get_memory, search, list, recall_for_context, list_projects,
         get_project, create_project, delete_project, ingest_project,
         consolidate, stats, recent_activity, register_agent.
      4. Use a unique tag like `mcp-smoke-<timestamp>` on every memory
         written so the script can clean up after itself.
      5. Print a final summary table: tool name, status (PASS/FAIL),
         elapsed_ms, and a one-line error message for any FAIL.
      6. Exit non-zero if any tool fails.
      7. The script must work without network, without a project-specific
         root_path, and must not depend on the desktop app running.
      8. Add a `pnpm mcp:test` script in package.json that calls the
         test script.

      For `delete_project` and `ingest_project` you may need a
      throwaway project — create one named `mcp-smoke-<ts>` and delete it
      at the end. The `default` project must NOT be touched.

      Run the script after writing it and confirm all 16 tools pass.
      Report the summary table.
    verify_prompt: |
      Independently verify the MCP smoke test.

      1. Confirm scripts/test-mcp.sh (or .py) exists and is executable.
      2. Run it from /Users/lxxfysl/Projekte/biTurbo and capture the
         final summary table. All 16 tools must show PASS.
      3. Confirm the script cleans up after itself: after the run, the
         SQLite DB at ~/Library/Application Support/com.biturbo.app/biturbo.db
         should not contain any project named `mcp-smoke-*` and should
         not have any memory with the `mcp-smoke-<ts>` tag (use
         `sqlite3 ... "SELECT id,name FROM projects WHERE name LIKE
         'mcp-smoke-%'"` and the same for memories to verify).
      4. Confirm `pnpm mcp:test` exists in package.json and runs the
         script.
      5. PASS only if all 16 tools pass and cleanup is verified. Report
         the summary table verbatim.

  - id: graph-perf
    title: "Instant-load graph: canvas + viewport culling for 3k+ nodes"
    assigned_to: coder
    verified_by: verifier
    max_retries: 2
    prompt: |
      Rewrite the graph view in
      /Users/lxxfysl/Projekte/biTurbo/src/views/Graph.tsx so opening a
      project with 3000+ nodes is instantaneous (< 200ms to first paint,
      < 2s to stable layout).

      The current implementation renders an inline SVG with one DOM
      element per node and one per edge, plus a 80-iteration O(n²) force
      layout on the main thread. That breaks at 3k nodes (~36M repulsion
      calculations + 36k SVG elements).

      Concrete requirements:
      1. Replace the inline `<svg>` rendering with an HTML5 `<canvas>`
         using a 2D context. Draw nodes as filled circles and edges as
         lines in a single frame. Keep zoom/pan via the existing
         transform state.
      2. Implement viewport culling: only draw nodes whose screen-space
         bounding box intersects the visible canvas region. Edges where
         BOTH endpoints are culled are skipped; edges with one culled
         endpoint still draw so the user can see lines "entering" the
         view.
      3. Replace the O(n²) force layout with a Barnes–Hut approximation
         (quadtree) so layout is O(n log n) and runs in under 1s for
         3k nodes. Keep the existing visual style (file kind colors,
         edge colors, radius function, hover highlight). Layout may run
         in a Web Worker OR be split into multiple `requestAnimationFrame`
         chunks; either is fine as long as the main thread stays
         responsive.
      4. Keep the existing right-side sidebar (filter checkboxes, edge
         legend, hover node info, tips) unchanged.
      5. Keep the existing top bar (project id, node/edge counts, search,
         refresh, reset, zoom buttons) unchanged.
      6. Hover detection: track mouse position, hit-test against the
         current node list every frame (or every Nth frame) and set
         `hover` state for the sidebar highlight.
      7. Click detection: a click that lands on a node calls
         `setSelected(n.uid)` for non-file kinds, same as today.
      8. Make sure the StrictMode double-invoke does not break first
         paint (the previous lastLayoutKey bug must not return).

      Test: after your rewrite, ingest or load a project with 3k+ nodes
      and confirm the graph paints within 200ms of clicking the Graph
      view. Then stabilize within 2s.

      Use the existing project graph IPC at
      api.getProjectGraph(project_id) which returns
      { nodes: GraphNode[], edges: GraphEdge[] }. The store already
      caches it.

      After changes, run `pnpm build` and confirm zero errors. Report
      changed files, the build tail, and a one-line "what changed"
      summary.

      Constraint: no new npm dependencies.
    verify_prompt: |
      Independently verify the graph perf rewrite.

      1. Read src/views/Graph.tsx and confirm it uses a `<canvas>` element
         (not an inline `<svg>` with one DOM node per entity). Confirm
         viewport culling is implemented (a function like
         `isInViewport(node, view)` or equivalent).
      2. Confirm the layout is no longer a naive O(n²) double loop over
         all node pairs. Either Barnes–Hut, a Worker, or a chunked
         rAF-driven layout. Show the relevant code.
      3. Confirm hover and click hit-testing work via canvas mouse
         events (not SVG element onClick).
      4. Run `pnpm build` — must succeed.
      5. Launch the app (it should already be running or relaunch with
         `nohup src-tauri/target/release/biturbo > /tmp/biturbo.log 2>&1 &`).
         Pick a project. If no project has 3k+ nodes, ingest the
         /Users/lxxfysl/Projekte/biTurbo project twice with different
         root_path settings OR add enough dummy data via the
         `remember` MCP tool to exceed 3k nodes in the `biturbo`
         project's graph. Then click Graph and time the first paint
         using the new webview log forwarding (read /tmp/biturbo.log).
         PASS only if the first canvas paint logs within 200ms of
         opening the view AND a "layout done" log appears within 2s.
         The producer of this task is responsible for adding the
         timing logs.
      6. Report file:line of: (a) the canvas, (b) the culling check,
         (c) the layout algorithm entry point, (d) the hit-test code.

  - id: integration-gate
    title: "Integration gate: build + relaunch + smoke checks"
    assigned_to: verifier
    depends_on: [light-mode, confirm-modal, context-menu, mcp-smoke-test, graph-perf]
    max_retries: 1
    verify_skip_reason: "Final integration check is the closure gate; its own re-run is the verification."
    prompt: |
      Final integration check for biTurbo v0.2.

      Run, in order, from /Users/lxxfysl/Projekte/biTurbo:

      1. `pnpm build` — must succeed.
      2. `cargo build --release` from src-tauri — must succeed.
      3. `bash scripts/test-mcp.sh` (or pnpm mcp:test) — all 16 MCP
         tools must show PASS in the final summary.
      4. Kill any running biturbo process, relaunch with
         `nohup src-tauri/target/release/biturbo > /tmp/biturbo.log 2>&1 &`,
         wait 5 seconds, confirm it is alive with `ps -p $! -o pid,etime,rss`.
      5. Confirm the Rust binary now registers the `commands::bootstrap`
         IPC and includes the new `log_frontend` IPC, and that
         `ingest_project` is non-blocking (returns a job id, not an
         IngestResult). grep src-tauri/src/lib.rs and src-tauri/src/commands.rs.
      6. Read /tmp/biturbo.log and confirm there are no PANIC or
         "error while running tauri application" lines from the
         relaunched app.

      Report PASS or FAIL with the exact failing step.
    verify_prompt: |
      Re-run the integration gate from a clean state. Do NOT trust the
      producer's report. Capture full output of each step and PASS only
      if all six steps succeed.
